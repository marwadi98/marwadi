<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <!-- प्रोफाइल इमेज (यहाँ अपनी इमेज का लिंक डालें) -->
        <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">
        
        <!-- आपका नाम और रोल -->
        <h1 class="name">आपका नाम</h1>
        <p class="title">वेब डेवलपर / डिज़ाइनर</p>
        
        <!-- छोटा सा बायो -->
        <p class="bio">
            नमस्ते! मुझे नए-नए वेब प्रोजेक्ट्स बनाना और क्लीन कोड लिखना पसंद है। मैं हमेशा नई तकनीकों को सीखने के लिए उत्सुक रहता हूँ।
        </p>
        
        <!-- सोशल मीडिया लिंक्स -->
        <div class="social-links">
            <a href="#" class="btn">GitHub</a>
            <a href="#" class="btn">LinkedIn</a>
            <a href="#" class="btn">Twitter</a>
        </div>
    </div>

</body>
</html>
