<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tagda Profile</title>
    <style>
        /* बेसिक रीसेट और फॉन्ट सेटअप */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* डार्क फ्यूचरिस्टिक बैकग्राउंड */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a;
            overflow: hidden;
            position: relative;
        }

        /* एनिमेटेड बैकग्राउंड सर्कल्स */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: floatBg 8s infinite alternate ease-in-out;
        }

        .circle1 {
            width: 300px;
            height: 300px;
            background: #ff007f;
            top: 10%;
            left: 15%;
        }

        .circle2 {
            width: 350px;
            height: 350px;
            background: #00f2fe;
            bottom: 10%;
            right: 15%;
            animation-delay: -4s;
        }

        @keyframes floatBg {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.2); }
        }

        /* ग्लासमोर्फिज़्म प्रोफाइल कंटेनर */
        .profile-container {
            position: relative;
            z-index: 10;
        }

        .profile-card {
            position: relative;
            width: 380px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            transition: 0.5s ease;
            overflow: hidden;
        }

        /* कार्ड होवर एनिमेशन */
        .profile-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 25px 50px rgba(0, 242, 254, 0.2);
        }

        /* नियॉन ग्लोइंग इमेज बॉर्डर */
        .img-box {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff007f, #00f2fe);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            animation: rotateBorder 6s infinite linear;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1e293b;
            border: 3px solid #0f172a;
        }

        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }

        /* टेक्स्ट स्टाइल्स */
        .name {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .class-info {
            color: #cbd5e1;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .highlight {
            color: #00f2fe;
            font-weight: 600;
        }

        /* पैशन सेक्शन और टाइपिंग एनिमेशन */
        .passion-box {
            margin-bottom: 20px;
        }

        .passion-text {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .animated-typing {
            font-size: 18px;
            color: #ff007f;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #fff;
            width: 100%;
            margin: 5px auto 0;
            animation: typing 3.5s steps(30, end) infinite, blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            0%, 100% { width: 0 }
            50%, 90% { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #ff007f; }
        }

        .bio {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* नियॉन बटन्स */
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .btn-github {
            background: transparent;
            border: 2px solid #ff007f;
            box-shadow: inset 0 0 0 0 #ff007f;
        }

        .btn-github:hover {
            background: #ff007f;
            box-shadow: 0 0 15px #ff007f;
        }

        .btn-linkedin {
            background: transparent;
            border: 2px solid #00f2fe;
            box-shadow: inset 0 0 0 0 #00f2fe;
        }

        .btn-linkedin:hover {
            background: #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <!-- बैकग्राउंड एनिमेटेड ग्लोइंग सर्कल्स -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <!-- मेन प्रोफाइल कार्ड -->
    <div class="profile-container">
        <div class="profile-card">
            
            <!-- प्रोफाइल इमेज ग्लोइंग बॉर्डर के साथ -->
            <div class="img-box">
                <img src="https://via.placeholder.com/150" alt="Profile Image">
            </div>

            <!-- नाम और डिटेल्स -->
            <div class="content">
                <h1 class="name">आपका नाम</h1>
                <p class="class-info">🎓 Class: <span class="highlight">आपकी क्लास</span></p>
                
                <!-- एनिमेटेड टाइपिंग/पैशन टेक्स्ट -->
                <div class="passion-box">
                    <p class="passion-text">My Passion is</p>
                    <div class="animated-typing">
                        <span>Coding & Web Development</span>
                    </div>
                </div>

                <p class="bio">
                    वेब की दुनिया को और खूबसूरत और क्रिएटिव बनाने का जूनून है। कोड लिखना सिर्फ काम नहीं, मेरी रगों में बहता पैशन है!
                </p>

                <!-- सोशल मीडिया बटन्स -->
                <div class="social-buttons">
                    <a href="#" class="btn btn-github">GitHub</a>
                    <a href="#" class="btn btn-linkedin">LinkedIn</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
