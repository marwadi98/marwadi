<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tagda Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a;
            overflow: hidden;
            position: relative;
        }

        /* बैकग्राउंड एनिमेटेड सर्कल्स */
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: floatBg 8s infinite alternate ease-in-out;
        }

        .circle1 { width: 300px; height: 300px; background: #ff007f; top: 10%; left: 15%; }
        .circle2 { width: 350px; height: 350px; background: #00f2fe; bottom: 10%; right: 15%; animation-delay: -4s; }

        @keyframes floatBg {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.2); }
        }

        /* प्रोफाइल कार्ड */
        .profile-container { position: relative; z-index: 10; }

        .profile-card {
            width: 380px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            text-align: center;
            transition: 0.5s;
        }

        .profile-card:hover { transform: translateY(-10px); border-color: #00f2fe; }

        .img-box {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff007f, #00f2fe);
            animation: rotateBorder 6s infinite linear;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1e293b;
        }

        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }

        .name { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 10px; }

        .bio { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }

        /* सोशल बटन्स */
        .social-buttons { display: flex; justify-content: center; gap: 15px; }

        .btn {
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            transition: 0.3s;
            text-transform: uppercase;
            border: 2px solid;
        }

        .btn-github { border-color: #ff007f; }
        .btn-github:hover { background: #ff007f; box-shadow: 0 0 15px #ff007f; }

        .btn-insta { border-color: #00f2fe; }
        .btn-insta:hover { background: #00f2fe; box-shadow: 0 0 15px #00f2fe; color: #0f172a; }
    </style>
</head>
<body>

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="profile-container">
        <div class="profile-card">
            <div class="img-box">
                <img src="https://www.image2url.com/r2/default/images/1781990835728-a6f99d85-6d0e-44c7-98d6-938016e62d77.webp" alt="Profile Image">
            </div>

            <div class="content">
                <h1 class="name">MARWADI</h1>
                <p class="bio">वेब की दुनिया को और खूबसूरत और क्रिएटिव बनाने का जूनून है। कोड लिखना सिर्फ काम नहीं, मेरा पैशन है!</p>
                
                <div class="social-buttons">
                    <a href="#" class="btn btn-github">GitHub</a>
                    <!-- यहाँ लिंक फिक्स कर दिया गया है -->
                    <a href="https://www.instagram.com/marwadi_raja_ffx?igsh=MTgwdmdyc2puODF6eQ%3D%3D" target="_blank" class="btn btn-insta">INSTAGRAM</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
